name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic-tests-and-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run deterministic unittest suite
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys

          excluded = {"test_amplitude_live_chart_contract.py"}
          test_files = sorted(pathlib.Path("tests").glob("test_*.py"))
          modules = [f"tests.{path.stem}" for path in test_files if path.name not in excluded]
          if not modules:
              raise SystemExit("No deterministic test modules found.")

          print("Running modules:")
          for module in modules:
              print(f"- {module}")
          subprocess.check_call([sys.executable, "-m", "unittest", *modules])
          PY

      - name: Run public-safety scan
        run: python scripts/public_safety_scan.py --root .
